[tool.ruff]
line-length = 88
target-version = "py313"

[tool.ruff.lint]
# E, W : pycodestyle (PEP8 스타일 검사)
# F    : pyflakes (미사용 import/변수 등)
# I    : isort (import 정렬)
# UP   : pyupgrade (구식 문법 현대화)
select = ["E", "W", "F", "I", "UP"]

[tool.ruff.format]
# Black 호환 포맷터
quote-style = "double"
indent-style = "space"
